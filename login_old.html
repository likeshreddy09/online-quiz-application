<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">
    <!-- Animated Background -->
    <div class="login-background">
        <div class="star" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
        <div class="star" style="top: 20%; right: 15%; animation-delay: 1s;"></div>
        <div class="star" style="top: 50%; left: 5%; animation-delay: 2s;"></div>
        <div class="star" style="bottom: 20%; right: 10%; animation-delay: 1.5s;"></div>
        <div class="star" style="bottom: 10%; left: 20%; animation-delay: 2.5s;"></div>
    </div>

    <!-- Magic Lamp Container -->
    <div class="login-container">
        <div class="lamp-wrapper">
            <!-- Magic Lamp Animation -->
            <div class="magic-lamp">
                <!-- Lamp Base -->
                <div class="lamp-base"></div>

                <!-- Lamp Body -->
                <div class="lamp-body">
                    <div class="lamp-shine"></div>
                </div>

                <!-- Lamp Spout -->
                <div class="lamp-spout"></div>

                <!-- Lamp Handle -->
                <div class="lamp-handle"></div>

                <!-- Magic Smoke/Genie Effect -->
                <div class="magic-smoke">
                    <div class="smoke-particle" style="animation-delay: 0s;"></div>
                    <div class="smoke-particle" style="animation-delay: 0.3s;"></div>
                    <div class="smoke-particle" style="animation-delay: 0.6s;"></div>
                    <div class="smoke-particle" style="animation-delay: 0.9s;"></div>
                </div>

                <!-- Glow Effect -->
                <div class="lamp-glow"></div>
            </div>
        </div>

        <!-- Login Form -->
        <div class="login-form-container">
            <h1 class="login-title">✨ Quiz Master</h1>
            <p class="login-subtitle">Unlock Your Learning Journey</p>

            <form id="loginForm" class="login-form">
                <!-- Username Field -->
                <div class="form-group mb-3">
                    <label for="username" class="form-label">Username or Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input 
                            type="text" 
                            class="form-control login-input" 
                            id="username" 
                            placeholder="Enter your username or email"
                            required
                        >
                    </div>
                    <small id="usernameHelp" class="form-text text-danger d-none"></small>
                </div>

                <!-- Password Field -->
                <div class="form-group mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input 
                            type="password" 
                            class="form-control login-input" 
                            id="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <span class="toggle-password" onclick="togglePasswordVisibility()">👁️</span>
                    </div>
                    <small id="passwordHelp" class="form-text text-danger d-none"></small>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="row mb-3">
                    <div class="col-6">
                        <div class="form-check">
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                id="rememberMe"
                            >
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                    </div>
                    <div class="col-6 text-end">
                        <a href="#" class="forgot-password-link" onclick="showForgotPassword(event)">Forgot Password?</a>
                    </div>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-primary login-btn w-100">
                    <span class="btn-text">✨ Login to Your Account</span>
                    <span class="btn-loader d-none">
                        <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                    </span>
                </button>

                <!-- Error Alert -->
                <div id="errorAlert" class="alert alert-danger d-none mt-3" role="alert"></div>

                <!-- Success Alert -->
                <div id="successAlert" class="alert alert-success d-none mt-3" role="alert"></div>
            </form>

            <!-- Sign Up Link -->
            <p class="login-footer text-center mt-4">
                Don't have an account? 
                <a href="#" class="signup-link" onclick="showSignUp(event)">Create one now</a>
            </p>

            <!-- Demo Login -->
            <div class="demo-login mt-4 pt-4 border-top">
                <p class="text-center text-muted mb-3">Try Demo Account</p>
                <button type="button" class="btn btn-outline-secondary btn-sm w-100" onclick="useDemoCredentials()">
                    📋 Use Demo Credentials
                </button>
                <small class="text-muted d-block text-center mt-2">
                    Demo: testuser / password123
                </small>
            </div>
        </div>
    </div>

    <!-- Sign Up Modal -->
    <div class="modal fade" id="signupModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content login-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title">Create Your Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="signupForm">
                        <div class="mb-3">
                            <label for="signupName" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="signupName" required>
                        </div>
                        <div class="mb-3">
                            <label for="signupEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="signupEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="signupUsername" class="form-label">Username</label>
                            <input type="text" class="form-control" id="signupUsername" required>
                        </div>
                        <div class="mb-3">
                            <label for="signupPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="signupPassword" required>
                        </div>
                        <div class="mb-3">
                            <label for="signupConfirm" class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="signupConfirm" required>
                        </div>
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                            <label class="form-check-label" for="agreeTerms">
                                I agree to the Terms and Conditions
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content login-modal">
                <div class="modal-header border-0">
                    <h5 class="modal-title">Reset Your Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="forgotForm">
                        <p class="text-muted mb-3">Enter your email address and we'll send you a link to reset your password.</p>
                        <div class="mb-3">
                            <label for="resetEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="resetEmail" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
