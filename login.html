<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz Master</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="login-body">
    <!-- Animated Background -->
    <div class="login-background">
        <div class="star" style="top: 10%; left: 10%; animation-delay: 0s;"></div>
        <div class="star" style="top: 20%; right: 15%; animation-delay: 1s;"></div>
        <div class="star" style="top: 50%; left: 5%; animation-delay: 2s;"></div>
        <div class="star" style="bottom: 20%; right: 10%; animation-delay: 1.5s;"></div>
        <div class="star" style="bottom: 10%; left: 20%; animation-delay: 2.5s;"></div>
    </div>

    <!-- Magic Lamp Container -->
    <div class="login-container">
        <div class="lamp-wrapper">
            <!-- Magic Lamp Animation -->
            <div class="magic-lamp" id="toggleLamp">
                <!-- Lamp Base -->
                <div class="lamp-base"></div>

                <!-- Lamp Body -->
                <div class="lamp-body">
                    <div class="lamp-shine"></div>
                </div>

                <!-- Lamp Spout -->
                <div class="lamp-spout"></div>

                <!-- Lamp Handle -->
                <div class="lamp-handle"></div>

                <!-- Magic Smoke/Genie Effect -->
                <div class="magic-smoke" id="lampSmoke">
                    <div class="smoke-particle" style="animation-delay: 0s;"></div>
                    <div class="smoke-particle" style="animation-delay: 0.3s;"></div>
                    <div class="smoke-particle" style="animation-delay: 0.6s;"></div>
                    <div class="smoke-particle" style="animation-delay: 0.9s;"></div>
                </div>

                <!-- Glow Effect -->
                <div class="lamp-glow"></div>
            </div>

            <!-- Lamp Status -->
            <div class="lamp-status">
                <span id="lampStatusText">OFF</span>
            </div>

            <!-- Mode Instruction -->
            <div class="mode-instruction" id="modeInstruction">
                🔴 OFF = Register
            </div>
        </div>

        <!-- Login Form Section -->
        <div class="login-form-container" id="loginSection">
            <h1 class="login-title">✨ Quiz Master</h1>
            <p class="login-subtitle">Login to Your Account</p>

            <form id="loginForm" class="login-form">
                <!-- Username Field -->
                <div class="form-group mb-3">
                    <label for="username" class="form-label">Username or Email</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input
                            type="text"
                            class="form-control login-input"
                            id="username"
                            placeholder="Enter your username or email"
                            required
                        >
                    </div>
                    <small id="usernameHelp" class="form-text text-danger d-none"></small>
                </div>

                <!-- Password Field -->
                <div class="form-group mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input
                            type="password"
                            class="form-control login-input"
                            id="password"
                            placeholder="Enter your password"
                            required
                        >
                        <span class="toggle-password" onclick="togglePasswordVisibility()">👁️</span>
                    </div>
                    <small id="passwordHelp" class="form-text text-danger d-none"></small>
                </div>

                <!-- Remember Me & Forgot Password -->
                <div class="row mb-3">
                    <div class="col-6">
                        <div class="form-check">
                            <input
                                class="form-check-input"
                                type="checkbox"
                                id="rememberMe"
                            >
                            <label class="form-check-label" for="rememberMe">
                                Remember me
                            </label>
                        </div>
                    </div>
                    <div class="col-6 text-end">
                        <a href="#" onclick="showForgotModal()" class="text-decoration-none">Forgot password?</a>
                    </div>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-primary login-btn w-100 mb-3">
                    <span class="btn-text">🚀 Login & Start Quiz</span>
                    <span class="btn-loader d-none">⏳ Loading...</span>
                </button>

                <!-- Alerts -->
                <div id="logErrorAlert" class="alert alert-danger d-none mt-3" role="alert"></div>
                <div id="logSuccessAlert" class="alert alert-success d-none mt-3" role="alert"></div>
            </form>
        </div>

        <!-- Register Form Section -->
        <div class="login-form-container" id="registerSection" style="display: none;">
            <h1 class="login-title">✨ Quiz Master</h1>
            <p class="login-subtitle">Create Your Account</p>

            <form id="registerForm" class="login-form">
                <!-- Name Field -->
                <div class="form-group mb-3">
                    <label for="regName" class="form-label">Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input
                            type="text"
                            class="form-control login-input"
                            id="regName"
                            placeholder="Enter your full name"
                            required
                        >
                    </div>
                </div>

                <!-- Email Field -->
                <div class="form-group mb-3">
                    <label for="regEmail" class="form-label">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input
                            type="email"
                            class="form-control login-input"
                            id="regEmail"
                            placeholder="Enter your email"
                            required
                        >
                    </div>
                </div>

                <!-- Username Field -->
                <div class="form-group mb-3">
                    <label for="regUsername" class="form-label">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔤</span>
                        <input
                            type="text"
                            class="form-control login-input"
                            id="regUsername"
                            placeholder="Choose a username"
                            required
                        >
                    </div>
                </div>

                <!-- Avatar Selection -->
                <div class="form-group mb-3">
                    <label class="form-label">Choose Your Avatar</label>
                    <div class="avatar-grid" id="avatarGrid">
                        <!-- Avatars will be loaded by JavaScript -->
                    </div>
                    <input type="hidden" id="selectedAvatar" value="avatar-1">
                </div>

                <!-- Password Field -->
                <div class="form-group mb-3">
                    <label for="regPassword" class="form-label">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔐</span>
                        <input
                            type="password"
                            class="form-control login-input"
                            id="regPassword"
                            placeholder="Create a password"
                            required
                        >
                    </div>
                </div>

                <!-- Confirm Password Field -->
                <div class="form-group mb-3">
                    <label for="regConfirm" class="form-label">Confirm Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input
                            type="password"
                            class="form-control login-input"
                            id="regConfirm"
                            placeholder="Confirm your password"
                            required
                        >
                    </div>
                </div>

                <!-- Terms Agreement -->
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                    <label class="form-check-label" for="agreeTerms">
                        I agree to the <a href="#" class="text-decoration-none">Terms of Service</a> and <a href="#" class="text-decoration-none">Privacy Policy</a>
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit" class="btn btn-success login-btn w-100 mb-3">
                    <span class="btn-text">🎉 Create Account</span>
                    <span class="btn-loader d-none">⏳ Creating...</span>
                </button>

                <!-- Alerts -->
                <div id="regErrorAlert" class="alert alert-danger d-none mt-3" role="alert"></div>
                <div id="regSuccessAlert" class="alert alert-success d-none mt-3" role="alert"></div>
            </form>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div class="modal fade" id="forgotModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Reset Password</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="forgotForm">
                        <div class="mb-3">
                            <label for="resetEmail" class="form-label">Email Address</label>
                            <input type="email" class="form-control" id="resetEmail" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/confetti@2.4.0/dist/confetti.min.js"></script>
    <script src="js/login-auth.js"></script>
</body>
</html>
